<!doctype html>
<html lang="en">
  <head>
    <script>
      // Defensive patch for environments where window.fetch is custom-intercepted as a read-only getter
      try {
        const desc = Object.getOwnPropertyDescriptor(window, 'fetch') || Object.getOwnPropertyDescriptor(Object.getPrototypeOf(window), 'fetch');
        if (!desc || desc.configurable) {
          let originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get() {
              return originalFetch;
            },
            set(val) {
              originalFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn('Sandbox fetch assignment bypass failed to register', e);
      }
    </script>
